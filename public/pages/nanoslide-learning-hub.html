{
  id: 12, phase: 4,
  title: "Radix UI Headless Components",
  shortTitle: "Radix UI",
  subtitle: "无头组件与可访问性原语",
  concepts: ["Radix UI", "Popover", "asChild", "Slot", "Compound Components", "WAI-ARIA"],
  sections: [
    { type: "text", heading: "什么是 Headless UI 组件？", content: "<p><span class='en'>Headless Components</span> 只提供行为逻辑和可访问性，不强制样式。NanoSlide 的 <code>SlideAnnotationToolbar.tsx</code> 使用 <span class='en'>Radix Popover</span>：</p><ul><li><span class='en'>Compound Components</span>：Root、Trigger、Portal、Content 协同工作</li><li><code>asChild</code>：不渲染自身 DOM，将行为合并到子元素</li><li>内建 WAI-ARIA：自动管理 <code>aria-expanded</code>、焦点捕获</li><li>Portal：渲染到 <code>document.body</code>，避免 overflow 裁切</li></ul>" },
    { type: "code", lang: "typescript", code: "// SlideAnnotationToolbar.tsx — Radix Popover\nimport * as PopoverPrimitive from '@radix-ui/react-popover';\n\nfunction AnnotationListPopover({ open, onOpenChange, children, pptx }) {\n  return (\n    <PopoverPrimitive.Root open={open} onOpenChange={onOpenChange}>\n      <PopoverPrimitive.Trigger asChild>\n        {children}  {/* Button becomes trigger via asChild */}\n      </PopoverPrimitive.Trigger>\n      <PopoverPrimitive.Portal>\n        <PopoverPrimitive.Content\n          side=\"top\" sideOffset={8} align=\"start\"\n          className=\"z-50 w-72 rounded-xl border ...\"\n        >\n          {/* Annotation list */}\n        </PopoverPrimitive.Content>\n      </PopoverPrimitive.Portal>\n    </PopoverPrimitive.Root>\n  );\n}" },
    { type: "code", lang: "typescript", code: "// Usage — the button IS the trigger\n{totalCount > 0 && (\n  <AnnotationListPopover open={listOpen} onOpenChange={setListOpen} pptx={pptx}>\n    <button className=\"flex items-center gap-1.5 ...\">\n      <AnnotationIcon />\n      <span>{totalCount}</span>\n    </button>\n  </AnnotationListPopover>\n)}" },
    { type: "editor", code: "// 模拟 Radix Slot 的属性合并\nfunction mergeProps(slotProps, childProps) {\n  var merged = Object.assign({}, childProps);\n  Object.keys(slotProps).forEach(function(key) {\n    if (key === 'className') {\n      merged.className = [slotProps.className, childProps.className].filter(Boolean).join(' ');\n    } else if (key.startsWith('on') && typeof slotProps[key] === 'function') {\n      var slotFn = slotProps[key], childFn = childProps[key];\n      merged[key] = function() { if (childFn) childFn(); slotFn(); };\n    } else if (!(key in childProps)) {\n      merged[key] = slotProps[key];\n    }\n  });\n  return merged;\n}\nvar slotProps = { onClick: function() { console.log('Radix: toggle popover'); }, 'aria-expanded': true, className: 'radix-trigger' };\nvar childProps = { onClick: function() { console.log('User: custom click'); }, className: 'my-btn text-sm' };\nvar result = mergeProps(slotProps, childProps);\nconsole.log('Merged className:', result.className);\nconsole.log('aria-expanded:', result['aria-expanded']);\nconsole.log('--- Click handler chain ---');\nresult.onClick();" },
    { type: "deepdive", heading: "Compound Component 的内部通信", content: "<p>Root 创建 Context 持有 open/onOpenChange。Trigger 消费 Context 绑定 onClick。Content 根据 open 渲染。Portal 用 createPortal 渲染到 body。</p><p><strong>data-state 动画</strong>：Radix 在 Content 上注入 <code>data-state=\"open|closed\"</code>，Tailwind 可用 <code>data-[state=open]:fade-in</code> 做动画。</p>" },
    { type: "quiz", questions: [
      { q: "asChild 属性的作用？", options: ["A. 不渲染自身 DOM，将行为属性合并到子元素", "B. 深拷贝子组件", "C. 渲染为 <child> 标签", "D. 禁用事件"], answer: 0 },
      { q: "Radix Compound Components 之间如何通信？", options: ["A. 全局 Zustand store", "B. DOM 事件冒泡", "C. React Context 共享内部状态", "D. Props 逐层传递"], answer: 2 }
    ]}
  ]
},
{
  id: 13, phase: 4,
  title: "Lingui i18n Internationalization",
  shortTitle: "Lingui i18n",
  subtitle: "宏提取与动态语言切换",
  concepts: ["Lingui", "i18n", "Macro Extraction", "PO Files", "Dynamic Import", "Code Splitting"],
  sections: [
    { type: "text", heading: "Lingui 国际化架构", content: "<p><span class='en'>Lingui</span> 基于编译时宏提取。NanoSlide 支持 9 种语言：</p><ul><li><span class='en'>Macro extraction</span>：<code>t</code> 模板标签在构建时被提取为消息 ID</li><li><span class='en'>Static preload</span>：英文静态导入，避免阻塞首屏</li><li><span class='en'>Dynamic import</span>：其他语言按需加载</li><li><span class='en'>Custom Event</span>：<code>interfaceLanguageChanged</code> 通知全局</li></ul>" },
    { type: "code", lang: "typescript", code: "// lib/i18n.ts — Core setup\nimport { i18n } from '@lingui/core';\nimport { messages as enMessages } from '@/locales/en/messages.mjs';\n\ni18n.load('en', enMessages); // 英文静态加载\ni18n.activate('en');\n\nexport async function loadCatalog(locale: Locale) {\n  if (locale === 'en') { i18n.activate('en'); return; }\n  try {\n    const { messages } = await import(`../locales/${locale}/messages`);\n    i18n.load(locale, messages);\n    i18n.activate(locale);\n  } catch {\n    i18n.activate(defaultLocale); // Fallback to English\n  }\n}\n\nexport async function changeLocale(locale: Locale) {\n  localStorage.setItem('interface_language', locale);\n  await loadCatalog(locale);\n  window.dispatchEvent(\n    new CustomEvent('interfaceLanguageChanged', { detail: { language: locale } })\n  );\n}" },
    { type: "code", lang: "typescript", code: "// Lingui macro 使用\nimport { useLingui } from '@lingui/react/macro';\n\nfunction SlideAnnotationToolbar({ pptx }) {\n  const { t } = useLingui();\n  return (\n    <div>\n      <button>{t`Discard`}</button>\n      <button>{t`Apply`}</button>\n    </div>\n  );\n}\n// 构建时提取到 PO 文件:\n// msgid \"Discard\"\n// msgstr \"\"  ← 翻译者填写" },
    { type: "editor", code: "// 模拟语言检测瀑布逻辑\nfunction getInitialLocale(storage, cookie, browserLang) {\n  var locales = ['en','zh-TW','zh-CN','ja','ko','fr','es'];\n  function isValid(l) { return locales.indexOf(l) !== -1; }\n  if (storage && isValid(storage)) { console.log('Level 1 - localStorage:', storage); return storage; }\n  if (cookie && isValid(cookie)) { console.log('Level 2 - Cookie:', cookie); return cookie; }\n  console.log('Level 3 - Browser:', browserLang);\n  if (isValid(browserLang)) return browserLang;\n  if (browserLang.indexOf('zh') === 0) {\n    if (browserLang.indexOf('TW') >= 0 || browserLang === 'zh-HK') return 'zh-TW';\n    return 'zh-CN';\n  }\n  var prefix = browserLang.split('-')[0];\n  var match = locales.find(function(l) { return l.indexOf(prefix) === 0; });\n  return match || 'en';\n}\nconsole.log('Test 1:', getInitialLocale('ja', null, 'en-US'));\nconsole.log('Test 2:', getInitialLocale(null, null, 'zh-HK'));\nconsole.log('Test 3:', getInitialLocale(null, null, 'fr-FR'));" },
    { type: "deepdive", heading: "Lingui Macro 的编译时魔法", content: "<p><code>t\\`Apply\\`</code> 在编译时被转换为 <code>i18n._('Apply')</code>。提取工具扫描所有 <code>t\\`...\\`</code> 生成 PO 文件。编译后优化为 .mjs 字典查找。</p><p>英文静态导入（无延迟），其他语言 <code>import()</code> 动态加载。Webpack 为每个 locale 生成独立 chunk。</p>" },
    { type: "quiz", questions: [
      { q: "为什么英文静态导入，其他语言动态导入？", options: ["A. 英文文件最小", "B. 英文是默认语言避免首屏白屏，其他按需加载减小 bundle", "C. 动态导入不支持英文", "D. 更安全"], answer: 1 },
      { q: "getInitialLocale 三级检测顺序？", options: ["A. Cookie → Browser → localStorage", "B. Browser → localStorage → Cookie", "C. localStorage → Cookie → Browser", "D. Server → Cookie → Browser"], answer: 2 }
    ]}
  ]
},
{
  id: 14, phase: 4,
  title: "Optimistic Updates & Error Recovery",
  shortTitle: "Error Recovery",
  subtitle: "Token 预刷新、重试、中止与批处理管线",
  concepts: ["Optimistic Update", "Token Pre-refresh", "401 Retry", "suppressAlert", "AbortController", "Batch Pipeline"],
  sections: [
    { type: "text", heading: "网络请求的防御式编程", content: "<p><code>applyAnnotations</code> 是多步骤 <span class='en'>batch pipeline</span>，使用多层防御：</p><ul><li><span class='en'>Token Pre-refresh</span>：每轮迭代前刷新 token</li><li><span class='en'>401 Retry</span>：检测到 401 后刷新 token 重试一次</li><li><code>suppressAlert</code>：防止批处理弹出多个 toast</li><li><span class='en'>AbortController</span>：支持用户取消和组件卸载</li><li>Safety-net Timeout：每张 180s + 缓冲</li></ul>" },
    { type: "code", lang: "typescript", code: "// PptxPreview.ts — applyAnnotations (simplified)\nasync applyAnnotations(): Promise<void> {\n  if (this.isGenerating) return; // Mutex guard\n  this._disposeController = new AbortController();\n\n  const ensureFreshToken = async () => {\n    try { await useUserStore.getState().getAccessToken(); }\n    catch { /* will retry on 401 */ }\n  };\n\n  const is401 = (err) => err?.response?.status === 401;\n\n  for (let i = 0; i < annotatedEntries.length; i++) {\n    if (this._disposeController?.signal.aborted) break;\n    await ensureFreshToken();\n\n    let retries = 1;\n    while (retries >= 0) {\n      try {\n        const result = await editImage(\n          { prompt, image_paths: [...] },\n          controller.signal,\n          { suppressAlert: true }  // Silent during batch\n        );\n        break; // success\n      } catch (err) {\n        retries--;\n        if (retries < 0) failedIndices.push(slideIndex);\n        else if (is401(err)) await ensureFreshToken();\n      }\n    }\n  }\n}" },
    { type: "editor", code: "// 模拟指数退避重试\nfunction simulateRetry(config) {\n  var max = config.maxRetries || 3;\n  var init = config.initialDelay || 1000;\n  var maxD = config.maxDelay || 10000;\n  var factor = config.backoffFactor || 2;\n  var failUntil = config.failUntil || 2;\n  for (var a = 0; a <= max; a++) {\n    if (a >= failUntil) { console.log('Attempt ' + (a+1) + ': SUCCESS'); return; }\n    console.log('Attempt ' + (a+1) + ': FAILED');\n    if (a < max) {\n      var delay = Math.min(init * Math.pow(factor, a), maxD);\n      console.log('  Wait ' + delay + 'ms');\n    }\n  }\n  console.log('All retries exhausted!');\n}\nconsole.log('=== Succeeds on attempt 3 ===');\nsimulateRetry({ failUntil: 2 });\nconsole.log('\\n=== All fail ===');\nsimulateRetry({ failUntil: 99 });" },
    { type: "deepdive", heading: "suppressAlert 与容错设计", content: "<p>批量处理 5 张 slide 时若 slide 3 返回 500，<code>suppressAlert</code> 让错误静默，最后统一汇总。</p><p>Token 三重保护：预刷新 → Axios 拦截器自动附 token → 401 检测重试。</p>" },
    { type: "quiz", questions: [
      { q: "suppressAlert: true 的作用？", options: ["A. 加速请求", "B. 让错误静默，避免批处理中弹多个 toast", "C. 禁用 Sentry", "D. 跳过认证"], answer: 1 },
      { q: "为什么循环中每次调用 ensureFreshToken？", options: ["A. Axios 不自动添加 token", "B. 批处理可能跑数分钟，token 可能过期", "C. 每张 slide 需不同 token", "D. 清除缓存"], answer: 1 }
    ]}
  ]
},
{
  id: 15, phase: 4,
  title: "Undo/Redo Implementation",
  shortTitle: "Undo/Redo",
  subtitle: "快照栈模式与不可变状态",
  concepts: ["Undo/Redo", "Snapshot Stack", "Command Pattern", "Immutable State", "structuredClone"],
  sections: [
    { type: "text", heading: "两种 Undo/Redo 设计模式", content: "<p><span class='en'>Command Pattern</span>：记录每个操作的正向和逆向命令。内存效率高但实现复杂。</p><p><span class='en'>Snapshot Stack</span>：每次修改前保存整个状态快照。实现极简但内存占用高。</p><p>NanoSlide 选择<strong>快照栈</strong>：标注数据量小，且 renumber 联动使 Command 逆操作极复杂。</p>" },
    { type: "code", lang: "typescript", code: "// PptxPreview.ts — Snapshot undo/redo\naddAnnotation(slideIndex, annotation) {\n  // 1. 保存快照\n  this.annotationUndoStack = [\n    ...this.annotationUndoStack,\n    { ...this.slideAnnotations }\n  ];\n  // 2. 清空 redo\n  this.annotationRedoStack = [];\n  // 3. 不可变更新\n  this.slideAnnotations = {\n    ...this.slideAnnotations,\n    [slideIndex]: { annotations: [...state.annotations, numbered] },\n  };\n}\n\nundoAnnotation() {\n  if (this.annotationUndoStack.length === 0) return;\n  const prev = this.annotationUndoStack[this.annotationUndoStack.length - 1];\n  this.annotationRedoStack = [...this.annotationRedoStack, this.slideAnnotations];\n  this.annotationUndoStack = this.annotationUndoStack.slice(0, -1);\n  this.slideAnnotations = prev;\n}\n\nredoAnnotation() {\n  if (this.annotationRedoStack.length === 0) return;\n  const next = this.annotationRedoStack[this.annotationRedoStack.length - 1];\n  this.annotationUndoStack = [...this.annotationUndoStack, this.slideAnnotations];\n  this.annotationRedoStack = this.annotationRedoStack.slice(0, -1);\n  this.slideAnnotations = next;\n}" },
    { type: "code", lang: "typescript", code: "// Session cache 使用 structuredClone 深拷贝\nsaveToSessionCache(): void {\n  setCacheEntry(cacheKey, {\n    slides: this.slides.map(s => ({ ...s })),\n    slideAnnotations: structuredClone(this.slideAnnotations),\n    annotationUndoStack: structuredClone(this.annotationUndoStack),\n    annotationRedoStack: structuredClone(this.annotationRedoStack),\n    _pageSessionToken: getPageSessionToken(),\n  });\n}\n// Undo 快照用浅拷贝（immutable update 保证安全）\n// Session cache 用深拷贝（实例可能被 dispose）" },
    { type: "editor", code: "// 模拟 snapshot-based undo/redo\nvar state = { items: ['A', 'B'] };\nvar undoStack = [], redoStack = [];\nfunction snapshot() { return { items: state.items.slice() }; }\nfunction addItem(item) {\n  undoStack.push(snapshot());\n  redoStack = [];\n  state = { items: state.items.concat([item]) };\n  console.log('Add \"' + item + '\" →', JSON.stringify(state.items));\n}\nfunction undo() {\n  if (!undoStack.length) { console.log('Nothing to undo'); return; }\n  redoStack.push(snapshot());\n  state = undoStack.pop();\n  console.log('Undo →', JSON.stringify(state.items));\n}\nfunction redo() {\n  if (!redoStack.length) { console.log('Nothing to redo'); return; }\n  undoStack.push(snapshot());\n  state = redoStack.pop();\n  console.log('Redo →', JSON.stringify(state.items));\n}\nconsole.log('Initial:', JSON.stringify(state.items));\naddItem('C'); addItem('D'); addItem('E');\nconsole.log('\\n--- Undo twice ---');\nundo(); undo();\nconsole.log('\\n--- Redo once ---');\nredo();\nconsole.log('\\n--- New action clears redo ---');\naddItem('F');\nredo();\nconsole.log('\\nFinal:', JSON.stringify(state.items));" },
    { type: "deepdive", heading: "Snapshot Stack vs Command Pattern 工程权衡", content: "<p><strong>Snapshot</strong>：3 行代码实现（push/pop/assign），天然正确。<strong>Command</strong>：每种操作需 execute/undo 配对，renumber 联动极其复杂。</p><p><strong>Structural Sharing</strong>：浅拷贝 <code>{ ...slideAnnotations }</code> 中未修改的 slide 共享同一引用，大幅节省内存。</p><p><strong>Session cache 用 structuredClone</strong>：因为原实例可能被 dispose，深拷贝确保独立。</p>" },
    { type: "quiz", questions: [
      { q: "选择 Snapshot Stack 的主要原因？", options: ["A. 更节省内存", "B. 标注数据小且 renumber 联动使 Command 逆操作极复杂", "C. Command 不支持 TS", "D. 运行速度更快"], answer: 1 },
      { q: "浅拷贝快照为什么不会导致 undo 数据错误？", options: ["A. 每次修改都创建新内部对象（immutable update），旧引用不变", "B. spread 自动深拷贝", "C. TypeScript 防止修改", "D. 浏览器自动冻结"], answer: 0 }
    ]}
  ]
}
];

// ===== APP STATE =====
const STATE_KEY = 'nanoslide-learning-hub';
let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
if (!state.completed) state.completed = {};
if (!state.quizAnswers) state.quizAnswers = {};
if (!state.activeTopic) state.activeTopic = 0;

function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

// ===== RENDER SIDEBAR =====
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const phases = [
    { num: 1, label: 'Phase 1: 基础必备 / Fundamentals' },
    { num: 2, label: 'Phase 2: 文件处理 / File Processing' },
    { num: 3, label: 'Phase 3: Canvas 动效 / Canvas Animation' },
    { num: 4, label: 'Phase 4: 架构与模式 / Architecture' }
  ];
  let html = '';
  phases.forEach(phase => {
    const items = TOPICS.filter(t => t.phase === phase.num);
    html += `<div class="phase-group">
      <div class="phase-title" data-phase="${phase.num}" onclick="togglePhase(this)">
        <span class="arrow">&#9662;</span> ${phase.label}
      </div>
      <div class="phase-items" id="phase-${phase.num}">
        ${items.map(t => `
          <div class="nav-item" data-phase="${t.phase}" data-id="${t.id}" onclick="goToTopic(${t.id})">
            <span class="check ${state.completed[t.id] ? 'done' : ''}" id="check-${t.id}">${state.completed[t.id] ? '&#10003;' : ''}</span>
            <span class="topic-num">${t.id + 1}.</span>
            <span>${t.shortTitle}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  });
  nav.innerHTML = html;
  updateProgress();
}

function togglePhase(el) {
  const phase = el.dataset.phase;
  const items = document.getElementById('phase-' + phase);
  el.classList.toggle('collapsed');
  items.classList.toggle('collapsed');
}

// ===== RENDER TOPICS =====
function renderTopics() {
  const main = document.getElementById('mainContent');
  main.innerHTML = TOPICS.map(t => `
    <div class="topic-page" id="topic-${t.id}" data-id="${t.id}">
      <span class="topic-phase-badge" data-phase="${t.phase}">Phase ${t.phase}</span>
      <h2 class="topic-title">${t.title}</h2>
      <p class="topic-subtitle">${t.subtitle}</p>
      <div class="concept-map">${t.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('')}</div>
      ${t.sections.map(s => renderSection(s, t.id)).join('')}
      <div class="topic-footer">
        <button class="mark-complete ${state.completed[t.id] ? 'done' : ''}" id="markBtn-${t.id}" onclick="toggleComplete(${t.id})">
          ${state.completed[t.id] ? '&#10003; Completed' : '&#9744; Mark Complete'}
        </button>
        <div style="display:flex;gap:8px">
          ${t.id > 0 ? `<button class="nav-btn" onclick="goToTopic(${t.id - 1})">&larr; Previous</button>` : ''}
          ${t.id < TOPICS.length - 1 ? `<button class="nav-btn" onclick="goToTopic(${t.id + 1})">Next &rarr;</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderSection(s, topicId) {
  if (s.type === 'text') return `<div class="section"><h3>${s.heading}</h3>${s.content}</div>`;
  if (s.type === 'code') return `<div class="code-block"><div class="code-header"><span class="lang">${s.lang || 'javascript'}</span><button onclick="copyCode(this)">Copy</button></div><pre><code class="language-${s.lang || 'javascript'}">${escapeHtml(s.code)}</code></pre></div>`;
  if (s.type === 'editor') return `<div class="live-editor"><div class="editor-header"><span class="label">&#9655; Live Editor</span><div class="editor-buttons"><button class="btn-run" onclick="runCode(this)">&#9654; Run</button><button class="btn-reset" onclick="resetCode(this, ${JSON.stringify(s.code).replace(/"/g, '&quot;')})">Reset</button></div></div><textarea class="editor-textarea" spellcheck="false">${escapeHtml(s.code)}</textarea><div class="editor-output"><span class="out-label">Output:</span></div></div>`;
  if (s.type === 'deepdive') return `<div class="deep-dive"><button class="deep-dive-toggle" onclick="toggleDeepDive(this)"><span class="icon">&#9654;</span> Deep Dive: ${s.heading}</button><div class="deep-dive-content">${s.content}</div></div>`;
  if (s.type === 'quiz') return renderQuiz(s, topicId);
  if (s.type === 'diagram') return `<div class="diagram"><pre>${s.content}</pre></div>`;
  return '';
}

function renderQuiz(s, topicId) {
  return `<div class="quiz"><h4><span class="quiz-icon">&#128300;</span> Quiz / 测验</h4>
    ${s.questions.map((q, qi) => {
      const qKey = `${topicId}-${qi}`;
      return `<div class="quiz-question" data-key="${qKey}">
        <div class="quiz-q">${qi + 1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.options.map((o, oi) => `
            <label class="quiz-option" onclick="selectQuizOption(this, '${qKey}', ${oi})">
              <span class="radio"></span> ${o}
            </label>
          `).join('')}
        </div>
        <div class="quiz-feedback" id="feedback-${qKey}"></div>
      </div>`;
    }).join('')}
    <button class="quiz-check-btn" onclick="checkQuiz(this, ${topicId}, ${JSON.stringify(s.questions.map(q=>q.answer)).replace(/"/g, '&quot;')})">Check Answers / 检查答案</button>
  </div>`;
}

// ===== INTERACTIONS =====
function goToTopic(id) {
  state.activeTopic = id;
  saveState();
  document.querySelectorAll('.topic-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById('topic-' + id);
  if (page) { page.classList.add('active'); }
  const navItem = document.querySelector(`.nav-item[data-id="${id}"]`);
  if (navItem) { navItem.classList.add('active'); navItem.scrollIntoView({ block: 'nearest' }); }
  document.querySelector('.main').scrollTop = 0;
  document.querySelector('.sidebar').classList.remove('open');
  Prism.highlightAllUnder(page);
}

function toggleComplete(id) {
  state.completed[id] = !state.completed[id];
  saveState();
  const btn = document.getElementById('markBtn-' + id);
  const check = document.getElementById('check-' + id);
  if (state.completed[id]) {
    btn.classList.add('done'); btn.innerHTML = '&#10003; Completed';
    check.classList.add('done'); check.innerHTML = '&#10003;';
  } else {
    btn.classList.remove('done'); btn.innerHTML = '&#9744; Mark Complete';
    check.classList.remove('done'); check.innerHTML = '';
  }
  updateProgress();
}

function updateProgress() {
  const done = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round((done / TOPICS.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${TOPICS.length} completed (${pct}%)`;
}

function runCode(btn) {
  const editor = btn.closest('.live-editor');
  const textarea = editor.querySelector('.editor-textarea');
  const output = editor.querySelector('.editor-output');
  const code = textarea.value;
  let logs = [];
  const fakeConsole = { log: (...args) => logs.push({type:'log', text:args.map(a => typeof a === 'object' ? JSON.stringify(a,null,2) : String(a)).join(' ')}), error: (...args) => logs.push({type:'error', text:args.join(' ')}), warn: (...args) => logs.push({type:'log', text:args.join(' ')}) };
  try {
    const fn = new Function('console', code);
    fn(fakeConsole);
  } catch(e) { logs.push({type:'error', text: e.message}); }
  output.innerHTML = '<span class="out-label">Output:</span>' + logs.map(l => `<div class="${l.type === 'error' ? 'error' : 'log'}">${escapeHtml(l.text)}</div>`).join('');
}

function resetCode(btn, original) {
  const editor = btn.closest('.live-editor');
  editor.querySelector('.editor-textarea').value = original;
  editor.querySelector('.editor-output').innerHTML = '<span class="out-label">Output:</span>';
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

function toggleDeepDive(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function selectQuizOption(label, qKey, optIndex) {
  const question = label.closest('.quiz-question');
  question.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  label.classList.add('selected');
  if (!state.quizAnswers[qKey]) state.quizAnswers[qKey] = {};
  state.quizAnswers[qKey] = optIndex;
  saveState();
}

function checkQuiz(btn, topicId, answers) {
  answers.forEach((correct, qi) => {
    const qKey = `${topicId}-${qi}`;
    const question = document.querySelector(`.quiz-question[data-key="${qKey}"]`);
    const selected = state.quizAnswers[qKey];
    const feedback = document.getElementById('feedback-' + qKey);
    question.querySelectorAll('.quiz-option').forEach((o, i) => {
      o.classList.remove('correct', 'wrong');
      if (i === correct) o.classList.add('correct');
      else if (i === selected && selected !== correct) o.classList.add('wrong');
    });
    if (selected === correct) {
      feedback.className = 'quiz-feedback show correct';
      feedback.textContent = '&#10003; Correct! / 正确！';
    } else if (selected !== undefined) {
      feedback.className = 'quiz-feedback show wrong';
      feedback.textContent = '&#10007; Incorrect / 不正确 — review the concept above.';
    }
  });
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== INIT =====
renderSidebar();
renderTopics();
goToTopic(state.activeTopic || 0);
</script>
</body>
</html>
